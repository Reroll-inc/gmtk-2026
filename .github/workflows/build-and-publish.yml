name: Build and Publish to Itch.io

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        default: "1.0.0"

env:
  ITCH_USERNAME: ${{ secrets.ITCH_USERNAME }}
  ITCH_GAME_ID: ${{ secrets.ITCH_GAME_ID }}
  GODOT_VERSION: "4.6.3"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Extract project name from project.godot
        id: project-name
        run: |
          if [ -f "project.godot" ]; then
            PROJECT_NAME=$(grep -oP 'config/name="\K[^"]+' project.godot)
            echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
            echo "Project name: $PROJECT_NAME"
          else
            echo "Error: project.godot file not found"
            exit 1
          fi

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Download and install export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATES_DIR"
          
          # Download and extract the export templates
          wget -O /tmp/export_templates.tpz "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          
          # Extract templates to the correct directory
          unzip -o /tmp/export_templates.tpz -d "$TEMPLATES_DIR"
          
          # Move templates if they're in a subdirectory
          if [ -d "$TEMPLATES_DIR/templates" ]; then
            mv "$TEMPLATES_DIR/templates/"* "$TEMPLATES_DIR/"
            rmdir "$TEMPLATES_DIR/templates"
          fi
          
          # Verify templates exist
          echo "Checking for web templates:"
          ls -la "$TEMPLATES_DIR"/web_* || echo "Warning: Web templates not found!"
          
          echo "Template directory contents:"
          ls -la "$TEMPLATES_DIR"

      - name: Create export directory
        run: mkdir -p ./export/html5

      - name: Build HTML5
        run: |
          godot --headless --export-release "HTML5" ./export/html5/index.html

      - name: Create ZIP archive
        run: |
          cd ./export/html5
          zip -r ../../${{ steps.project-name.outputs.PROJECT_NAME }}.zip ./*
          cd ../..
          echo "Created archive: ${{ steps.project-name.outputs.PROJECT_NAME }}.zip"

      - name: Setup Butler
        run: |
          # Download Butler from GitHub releases
          BUTLER_VERSION="15.29.0"
          wget -O butler.zip "https://github.com/itchio/butler/releases/download/v${BUTLER_VERSION}/butler-linux-amd64.zip"
          
          # Fallback to latest if specific version fails
          if [ $? -ne 0 ]; then
            echo "Specific version failed, trying latest release..."
            LATEST_URL=$(wget -qO- https://api.github.com/repos/itchio/butler/releases/latest | grep -oP '"browser_download_url": "\K[^"]*linux-amd64[^"]*')
            wget -O butler.zip "$LATEST_URL"
          fi
          
          # Extract Butler
          unzip butler.zip
          
          # Find and move Butler to a directory in PATH
          if [ -f "linux-amd64/butler" ]; then
            chmod +x linux-amd64/butler
            sudo mv linux-amd64/butler /usr/local/bin/
          elif [ -f "butler" ]; then
            chmod +x butler
            sudo mv butler /usr/local/bin/
          else
            echo "Butler binary not found!"
            echo "Contents of extraction:"
            find . -name "butler" -type f
            exit 1
          fi
          
          # Move libraries if they exist
          if [ -d "linux-amd64" ]; then
            sudo mv linux-amd64/*.so /usr/local/lib/ 2>/dev/null || true
          fi
          
          # Verify installation
          butler --version

      - name: Push to itch.io (Stable Channel)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Pushing ${{ steps.project-name.outputs.PROJECT_NAME }} version $VERSION to stable channel..."
          butler push ./${{ steps.project-name.outputs.PROJECT_NAME }}.zip ${{ secrets.ITCH_USERNAME }}/${{ secrets.ITCH_GAME_ID }}:html5 --userversion $VERSION

      - name: Push to itch.io (Beta Channel)
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "Pushing ${{ steps.project-name.outputs.PROJECT_NAME }} beta version to beta channel..."
          butler push ./${{ steps.project-name.outputs.PROJECT_NAME }}.zip ${{ secrets.ITCH_USERNAME }}/${{ secrets.ITCH_GAME_ID }}:html5-beta --userversion "beta-$SHORT_SHA"

      - name: Push to itch.io (Manual Trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          echo "Pushing ${{ steps.project-name.outputs.PROJECT_NAME }} version ${{ github.event.inputs.version }} from manual trigger..."
          butler push ./${{ steps.project-name.outputs.PROJECT_NAME }}.zip ${{ secrets.ITCH_USERNAME }}/${{ secrets.ITCH_GAME_ID }}:html5-manual --userversion "${{ github.event.inputs.version }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.project-name.outputs.PROJECT_NAME }}-${{ github.sha }}
          path: ./${{ steps.project-name.outputs.PROJECT_NAME }}.zip